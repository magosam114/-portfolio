<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상으로 매출을 만드는 사람</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
}

/* 메뉴 */
.nav {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.7);
  z-index:1000;
}

.nav a {
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* 메인 배경 */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.overlay {
  background:rgba(0,0,0,0.6);
  padding:40px;
  border-radius:12px;
}

/* 섹션 */
.section {
  padding:80px 20px;
  text-align:center;
  background:#111;
}

/* 버튼 */
.btn {
  display:inline-block;
  background:#ff2d2d;
  color:white;
  padding:18px 30px;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  font-size:18px;
  margin-top:20px;
}

/* 카톡 버튼 */
.kakao {
  background:#FEE500;
  color:#3C1E1E;
}
</style>

</head>

<body>

<!-- 메뉴 -->
<div class="nav">
  <div>🎬 마고쌤</div>
  <div>
    <a href="#video">영상</a>
    <a href="#about">소개</a>
    <a href="#contact">문의</a>
  </div>
</div>

<!-- 메인 -->
<div class="hero">
  <div class="overlay">

    <h2 style="color:#ffcc00;">
    영상 하나로 고객이 생긴다면,<br>
    아직도 안 하시겠습니까?
    </h2>

    <h1>🎬 검증된 영상 마케팅 전문가를 소개합니다</h1>

    <p>소상공인과 1인사업자를 위한 영상 마케팅 자동화 시스템</p>

    <a href="https://baekhyungjin.github.io/minart-live/" class="btn">
    🔥 지금 무료 강의 신청하기
    </a>

    <p style="margin-top:10px;color:#ffcc00;font-weight:bold;">
    ⚠ 추천인 "조향자" 입력 시 혜택 적용
    </p>

  </div>
</div>

<!-- 영상 -->
<div class="section" id="video">
  <h2>🎬 추천 강의</h2>

  <iframe width="350" height="600"
  src="https://www.youtube.com/embed/puH_AVzHFC8"
  frameborder="0" allowfullscreen></iframe>

</div>

<!-- 강사 소개 -->
<div class="section" id="about">
  <h2>👨‍🏫 강사 소개</h2>

  <p>일본에서 연구한 AI 마케팅 전문가, 민진홍 소장</p>
  <p>유튜브, 블로그, SNS 실전 마케팅 전문가</p>
  <p>✔ 다수 기업 및 대학 강의 진행</p>
</div>

<!-- 문의 -->
<div class="section" id="contact">

  <h2>📞 빠른 상담</h2>

  <a href="https://open.kakao.com/o/gjvao7Yf"
  target="_blank"
  class="btn kakao">
  💬 지금 바로 카톡 상담하기
  </a>

  <p style="margin-top:10px;color:#aaa;">
  ✔ 1:1 상담 가능 · 빠른 답변
  </p>

</div>

</body>
</html>
